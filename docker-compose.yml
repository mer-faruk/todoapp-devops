services:
  db:
    image: postgres:15
    container_name: todo_db
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: todo_app
    ports:
      - "8080:8080"
    depends_on:
      - db
